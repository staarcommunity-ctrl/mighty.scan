<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do BL</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header-bl { display: flex; gap: 20px; margin-bottom: 30px; }
        .capa-grande { width: 250px; aspect-ratio: 2/3; background: #333; border-radius: 8px; }
        .lista-caps { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .cap-item { display: block; padding: 12px; border-bottom: 1px solid #333; color: #ff79c6; text-decoration: none; }
        /* Botão Admin */
        #btn-admin { display: none; background: #50fa7b; color: #000; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color: #ff79c6;">⬅ Voltar ao Catálogo</a>
        
        <div style="margin-top: 20px;">
            <a href="upload_capitulo.html" id="btn-admin">+ Postar Novo Capítulo</a>
        </div>

        <div class="header-bl">
            <div class="capa-grande"></div>
            <div>
                <h1>Título do BL</h1>
                <ul>
                    <li><strong>Status:</strong> Em andamento</li>
                </ul>
            </div>
        </div>
        
        <div class="lista-caps">
            <h3>Capítulos</h3>
            <a href="leitor.html" class="cap-item">Capítulo 01</a>
        </div>
    </div>

    <script>
        // Simulação: Se você logar como admin, o botão aparece
        const ehAdmin = true; // Mude para false para testar o sumiço
        if (ehAdmin) {
            document.getElementById('btn-admin').style.display = 'inline-block';
        }
    </script>
</body>
</html>
